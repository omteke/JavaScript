<!DOCTYPE html>
<html>
<head>
    <title>AI Username Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI Username Generator</h1>

        <select id="category">
            <option value="gaming">Gaming Username</option>
            <option value="instagram">Instagram Username</option>
            <option value="brand">Brand Name</option>
        </select>

        <button onclick="generateUsername()">Generate</button>

        <div class="output">
            <input type="text" id="result" readonly>
            <button onclick="copyUsername()">Copy</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
